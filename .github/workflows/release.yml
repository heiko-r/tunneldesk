name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'   # semver tags, e.g. 1.2.3

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-26

    permissions:
      contents: write   # required to create a GitHub release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust (stable, both Apple Silicon targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build universal DMG
        run: ./scripts/bundle-macos.sh --universal --version "${{ github.ref_name }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "TunnelDesk ${{ github.ref_name }}" \
            --generate-notes \
            "TunnelDesk-${{ github.ref_name }}.dmg"
