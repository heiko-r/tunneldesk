[[repos]]
repo = "builtin"
hooks = [
  { id = "check-toml" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "cargo-fmt",
    name = "cargo fmt",
    description = "Format files with cargo fmt",
    entry = "cargo fmt",
    language = "system",
    types = ["rust"],
    args = ["--"]
  },
  {
    id = "cargo-check",
    name = "cargo check",
    description = "Check the package for errors",
    entry = "cargo check",
    language = "system",
    types = ["rust"],
    pass_filenames = false
  },
  {
    id = "clippy",
    name = "clippy",
    description = "Lint rust sources",
    entry = "cargo clippy",
    language = "system",
    args = ["--", "-D", "warnings"],
    types = ["rust"],
    pass_filenames = false
  },
  {
    id = "cargo-test",
    name = "cargo test",
    description = "Run tests",
    entry = "cargo test",
    language = "system",
    types = ["rust"],
    pass_filenames = false
  },
  {
    id = "prettier",
    name = "prettier",
    description = "Format frontend files with prettier",
    entry = "bash -c 'source ~/.nvm/nvm.sh && nvm use 24 && cd frontend && npx prettier --write .'",
    language = "system",
    files = "^frontend/",
    pass_filenames = false
  },
  {
    id = "eslint",
    name = "eslint",
    description = "Lint frontend files with eslint",
    entry = "bash -c 'source ~/.nvm/nvm.sh && nvm use 24 && cd frontend && npx eslint .'",
    language = "system",
    files = "^frontend/",
    pass_filenames = false
  },
  {
    id = "svelte-check",
    name = "svelte-check",
    description = "Type-check frontend with svelte-check",
    entry = "bash -c 'source ~/.nvm/nvm.sh && nvm use 24 && cd frontend && npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json'",
    language = "system",
    files = "^frontend/",
    pass_filenames = false
  },
  {
    id = "frontend-test",
    name = "frontend test",
    description = "Run frontend tests with vitest",
    entry = "bash -c 'source ~/.nvm/nvm.sh && nvm use 24 && cd frontend && npm run test'",
    language = "system",
    files = "^frontend/",
    pass_filenames = false
  },
]
